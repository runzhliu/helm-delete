name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build binaries
        run: make build-all

      - name: Package binaries
        run: |
          for file in bin/helm-cm-delete_*; do
            # Extract architecture & os suffix (e.g. linux_amd64)
            suffix=$(basename "$file" | sed 's/helm-cm-delete_//')
            
            # Form final tarball name according to install_plugin.sh expectations
            tarball="helm-cm-delete_${suffix}.tar.gz"
            if [[ "$file" == *.exe ]]; then
              tarball="helm-cm-delete_${suffix%.exe}.exe.tar.gz"
              mv "$file" bin/helm-cm-delete.exe
              tar -czvf "bin/${tarball}" -C bin helm-cm-delete.exe
              mv bin/helm-cm-delete.exe "$file"
            else
              mv "$file" bin/helm-cm-delete
              tar -czvf "bin/${tarball}" -C bin helm-cm-delete
              mv bin/helm-cm-delete "$file"
            fi
          done

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.tar.gz
          generate_release_notes: true